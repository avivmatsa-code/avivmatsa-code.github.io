  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="description" content="שער כניסה לאזורים פרטיים באתר." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="he_IL" />
    <meta property="og:title" content="כניסה לאתר" />
    <meta property="og:description" content="שער כניסה לאזורים פרטיים באתר." />
    <meta property="og:url" content="https://avivmatsa-code.github.io/" />
    <meta property="og:image" content="https://placehold.co/1200x630/0f172a/67e8f9.png?text=Private+Portal" />
    <meta property="og:image:secure_url" content="https://placehold.co/1200x630/0f172a/67e8f9.png?text=Private+Portal" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="כניסה לאתר" />
    <meta name="twitter:description" content="שער כניסה לאזורים פרטיים באתר." />
    <meta name="twitter:image" content="https://placehold.co/1200x630/0f172a/67e8f9.png?text=Private+Portal" />
    <link rel="canonical" href="https://avivmatsa-code.github.io/" />
    <link rel="stylesheet" href="/assets/site.css" />
    <style>
      body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .gate { width: min(100%, 460px); background: rgba(255,255,255,.92); border: 1px solid rgba(15,23,42,.12); border-radius: 8px; box-shadow: 0 24px 80px rgba(15,23,42,.16); padding: 28px; }
      .gate h1 { margin: 0 0 8px; font-size: clamp(2rem, 6vw, 3rem); color: #0f172a; }
      .gate p { margin: 0 0 22px; color: #475569; line-height: 1.7; }
      .field { display: grid; gap: 8px; margin-bottom: 14px; }
      .field label { font-weight: 800; color: #0f172a; }
      .field input { min-height: 46px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 12px; font: inherit; }
      .error { min-height: 24px; color: #b91c1c; font-weight: 800; }
      .menu { display: none; gap: 12px; margin-top: 20px; }
      .menu.is-open { display: grid; }
      .menu a { text-decoration: none; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <main class="gate" aria-labelledby="page-title">
      <p class="eyebrow"><span aria-hidden="true">🔐</span> כניסה</p>
      <h1 id="page-title">avivmatsa.com</h1>
      <p id="intro">יש להזין שם משתמש וסיסמה כדי לראות את התפריט.</p>

      <form id="login-form" autocomplete="off">
        <div class="field">
          <label for="username">שם משתמש</label>
          <input id="username" name="username" inputmode="latin" required />
        </div>
        <div class="field">
          <label for="password">סיסמה</label>
          <input id="password" name="password" type="password" required />
        </div>
        <button class="button primary" type="submit">כניסה</button>
        <div class="error" id="error" aria-live="polite"></div>
      </form>

      <nav class="menu" id="menu" aria-label="תפריט קישורים">
        <a class="button primary" href="/family/"><span aria-hidden="true">🏠</span> האתר המשפחתי</a>
      </nav>
    </main>

    <script>
      const USERNAME = "matsa";
      const PASSWORD = "BestFamilyEver";
      const form = document.getElementById("login-form");
      const menu = document.getElementById("menu");
      const error = document.getElementById("error");
      const intro = document.getElementById("intro");

      function openMenu() {
        form.classList.add("hidden");
        menu.classList.add("is-open");
        intro.textContent = "ברוך הבא. בחר יעד:";
      }

      if (localStorage.getItem("avivmatsa-gate") === "open") {
        openMenu();
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        if (username === USERNAME && password === PASSWORD) {
          localStorage.setItem("avivmatsa-gate", "open");
          openMenu();
        } else {
          error.textContent = "שם המשתמש או הסיסמה אינם נכונים.";
        }
      });
    </script>
  </body>
</html>
